name: Deploy to SSH Server

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: gform-bouncer
  DEPLOY_DIR: /opt/gform-bouncer

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            DEPLOY_DIR="/opt/gform-bouncer"
            APP_NAME="gform-bouncer"

            # 如果尚未 clone，先 clone；否則 pull 最新
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$DEPLOY_DIR"
            else
              cd "$DEPLOY_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd "$DEPLOY_DIR"

            # 安裝依賴
            npm ci --production

            # 更新 systemd 服務檔並重啟
            sudo cp "$DEPLOY_DIR/$APP_NAME.service" "/etc/systemd/system/$APP_NAME.service"
            sudo systemctl daemon-reload
            sudo systemctl restart "$APP_NAME"
            echo "✅ 部署完成！"
