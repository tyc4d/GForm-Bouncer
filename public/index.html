<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GForm Bouncer</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
      background:#f0f2f5;color:#1a1a2e;min-height:100vh;
    }

    /* ── Header ── */
    header{
      background:linear-gradient(135deg,#5865F2,#4752C4);color:#fff;
      padding:18px 40px;display:flex;justify-content:space-between;align-items:center;
      box-shadow:0 2px 10px rgba(0,0,0,.1);
    }
    header h1{font-size:1.3em;font-weight:700;letter-spacing:.02em}
    header nav a{color:rgba(255,255,255,.78);text-decoration:none;margin-left:20px;font-size:.88em;transition:color .15s}
    header nav a:hover{color:#fff}

    .container{max-width:880px;margin:0 auto;padding:36px 20px}

    /* ── Hero (landing) ── */
    .hero{text-align:center;padding:80px 20px 60px}
    .hero h2{font-size:2.4em;margin-bottom:12px;font-weight:800}
    .hero p{font-size:1.08em;color:#666;margin-bottom:44px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.7}
    .btn-google{
      display:inline-flex;align-items:center;gap:12px;
      background:#fff;color:#333;border:1px solid #dadce0;
      padding:14px 32px;border-radius:8px;font-size:1em;font-weight:500;
      cursor:pointer;text-decoration:none;transition:all .2s;
      box-shadow:0 1px 3px rgba(0,0,0,.08);
    }
    .btn-google:hover{box-shadow:0 4px 14px rgba(0,0,0,.12);transform:translateY(-1px)}

    /* ── User bar ── */
    .user-bar{
      display:flex;align-items:center;justify-content:space-between;
      background:#fff;border-radius:12px;padding:16px 24px;
      margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.05);
    }
    .user-bar .user{display:flex;align-items:center;gap:12px}
    .user-bar img{width:40px;height:40px;border-radius:50%}
    .user-bar .name{font-weight:600}
    .user-bar .email{font-size:.84em;color:#888}
    .btn-logout{
      background:none;border:1px solid #ddd;padding:8px 18px;
      border-radius:6px;cursor:pointer;color:#666;font-size:.88em;transition:background .15s;
    }
    .btn-logout:hover{background:#f5f5f5}

    /* ── Cards ── */
    .card{
      background:#fff;border-radius:12px;padding:28px;
      margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.05);
    }
    .card h3{font-size:1.08em;color:#333;margin-bottom:18px;display:flex;align-items:center;gap:8px}

    /* ── Status rows ── */
    .status-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0}
    .status-row:last-child{border-bottom:none}
    .status-label{color:#888;font-size:.9em}
    .status-value{font-weight:500;font-size:.9em;text-align:right;max-width:60%;word-break:break-all}
    .badge{display:inline-block;padding:3px 12px;border-radius:12px;font-size:.8em;font-weight:600}
    .badge-ok{background:#e8f8f0;color:#27ae60}
    .badge-none{background:#fff3e0;color:#e67e22}

    /* ── Form items ── */
    .form-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 18px;border:2px solid #eee;border-radius:10px;
      margin-bottom:8px;cursor:pointer;transition:all .15s;
    }
    .form-item:hover{border-color:#5865F2;background:#fafbff}
    .form-item.selected{border-color:#5865F2;background:#edefff}
    .form-name{font-weight:500}
    .form-date{font-size:.78em;color:#999;margin-top:2px}
    .check{
      width:22px;height:22px;border-radius:50%;border:2px solid #ccc;
      flex-shrink:0;display:flex;align-items:center;justify-content:center;
      transition:all .15s;font-size:13px;color:transparent;
    }
    .form-item.selected .check{background:#5865F2;border-color:#5865F2;color:#fff}

    .btn-save{
      background:#5865F2;color:#fff;border:none;
      padding:12px 30px;border-radius:8px;font-size:1em;
      cursor:pointer;margin-top:18px;font-weight:600;transition:background .2s;
    }
    .btn-save:hover{background:#4752C4}
    .btn-save:disabled{background:#bbb;cursor:not-allowed}

    .empty{color:#999;padding:20px 0;text-align:center}

    footer{text-align:center;padding:32px;font-size:.8em;color:#aaa}
    footer a{color:#999;text-decoration:none;margin:0 6px}
    footer a:hover{color:#666}
  </style>
</head>
<body>
  <header>
    <h1>GForm Bouncer</h1>
    <nav>
      <a href="/tos">服務條款</a>
      <a href="/privacy">隱私權政策</a>
    </nav>
  </header>

  <div class="container">
    <!-- ── Landing ── -->
    <div id="view-landing" style="display:none">
      <div class="hero">
        <h2>GForm Bouncer</h2>
        <p>自動根據 Google Form 回覆，為 Discord 伺服器成員指派角色。登入 Google 帳號以選擇要共享的表單。</p>
        <a href="/auth/google" class="btn-google">
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          使用 Google 帳號登入
        </a>
      </div>
    </div>

    <!-- ── Dashboard ── -->
    <div id="view-dashboard" style="display:none">
      <div class="user-bar" id="user-bar"></div>

      <div class="card">
        <h3>📋 目前設定</h3>
        <div id="config-status"><div class="empty">載入中…</div></div>
      </div>

      <div class="card">
        <h3>📄 選擇 Google 表單</h3>
        <div id="forms-container"><div class="empty">載入中…</div></div>
      </div>
    </div>
  </div>

  <footer>
    © 2026 GForm Bouncer&ensp;·&ensp;<a href="/tos">服務條款</a>&ensp;·&ensp;<a href="/privacy">隱私權政策</a>
  </footer>

  <script>
    let selectedFormId = null;
    let selectedFormName = null;

    async function init() {
      try {
        const res = await fetch("/api/me");
        if (!res.ok) throw new Error();
        showDashboard(await res.json());
      } catch {
        showLanding();
      }
    }

    function showLanding() {
      document.getElementById("view-landing").style.display = "";
      document.getElementById("view-dashboard").style.display = "none";
    }

    async function showDashboard(user) {
      document.getElementById("view-landing").style.display = "none";
      document.getElementById("view-dashboard").style.display = "";

      document.getElementById("user-bar").innerHTML = `
        <div class="user">
          <img src="${user.picture}" alt="" referrerpolicy="no-referrer">
          <div>
            <div class="name">${esc(user.name)}</div>
            <div class="email">${esc(user.email)}</div>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">登出</button>`;

      await Promise.all([loadConfig(), loadForms()]);
    }

    async function loadConfig() {
      const el = document.getElementById("config-status");
      try {
        const res = await fetch("/api/config");
        const c = await res.json();
        if (c.selectedFormId) {
          selectedFormId = c.selectedFormId;
          el.innerHTML = `
            <div class="status-row">
              <span class="status-label">表單名稱</span>
              <span class="status-value">${esc(c.selectedFormName || "—")}</span>
            </div>
            <div class="status-row">
              <span class="status-label">表單 ID</span>
              <span class="status-value" style="font-family:monospace;font-size:.82em">${c.selectedFormId}</span>
            </div>
            <div class="status-row">
              <span class="status-label">設定者</span>
              <span class="status-value">${esc(c.selectedBy || "—")}</span>
            </div>
            <div class="status-row">
              <span class="status-label">狀態</span>
              <span class="badge badge-ok">已設定</span>
            </div>`;
        } else {
          el.innerHTML = `
            <div class="status-row">
              <span class="status-label">狀態</span>
              <span class="badge badge-none">尚未選擇表單</span>
            </div>`;
        }
      } catch { el.innerHTML = '<div class="empty">無法載入設定</div>'; }
    }

    async function loadForms() {
      const box = document.getElementById("forms-container");
      try {
        const res = await fetch("/api/forms");
        const { forms } = await res.json();
        if (!forms.length) {
          box.innerHTML = '<div class="empty">此帳號下找不到任何 Google 表單</div>';
          return;
        }
        box.innerHTML =
          forms.map(f => `
            <div class="form-item${f.id === selectedFormId ? " selected" : ""}"
                 data-id="${f.id}" data-name="${esc(f.name)}" onclick="selectForm(this)">
              <div>
                <div class="form-name">${esc(f.name)}</div>
                <div class="form-date">最後修改：${new Date(f.modifiedTime).toLocaleString("zh-TW")}</div>
              </div>
              <div class="check">✓</div>
            </div>`).join("") +
          '<button class="btn-save" id="btn-save" onclick="saveSelection()">儲存選擇</button>';
      } catch (err) {
        box.innerHTML = `<div class="empty" style="color:#e74c3c">載入失敗：${esc(err.message)}</div>`;
      }
    }

    function selectForm(el) {
      document.querySelectorAll(".form-item").forEach(i => i.classList.remove("selected"));
      el.classList.add("selected");
      selectedFormId = el.dataset.id;
      selectedFormName = el.dataset.name;
    }

    async function saveSelection() {
      if (!selectedFormId) return;
      const btn = document.getElementById("btn-save");
      btn.disabled = true; btn.textContent = "儲存中…";
      try {
        const res = await fetch("/api/forms/select", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ formId: selectedFormId, formName: selectedFormName }),
        });
        if (!res.ok) throw new Error("Failed");
        btn.textContent = "✓ 已儲存";
        await loadConfig();
        setTimeout(() => { btn.textContent = "儲存選擇"; btn.disabled = false; }, 2000);
      } catch {
        btn.textContent = "儲存失敗"; btn.disabled = false;
      }
    }

    async function logout() {
      await fetch("/auth/logout", { method: "POST" });
      location.reload();
    }

    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

    init();
  </script>
</body>
</html>
